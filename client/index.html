<!doctype html>
<html lang="en" class="dark" style="color-scheme:dark;background:#0a0e27">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="color-scheme" content="dark" />
    <title>MyAPI — API Directory for Southeast Asia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function(){var d=document,l=d.createElement('div');l.id='html-loader';l.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0e27;font-family:"DM Sans",system-ui,sans-serif';
      var s='<div style="position:relative;width:192px;height:128px;border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(245,158,11,0.15);margin-bottom:32px"><div style="display:flex;flex-direction:column;height:100%">';
      for(var i=0;i<14;i++)s+='<div style="flex:1;background:'+(i%2===0?'#cc0000':'#ffffff')+'"></div>';
      s+='</div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-start"><div style="width:80px;height:100%;background:#000080;display:flex;align-items:center;justify-content:center">';
      s+='<div style="width:40px;height:40px;background:#ffcc00;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:p 2s ease-in-out infinite"></div></div></div>';
      s+='<div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#ffcc00,transparent);animation:p 2s ease-in-out infinite"></div></div>';
      s+='<h1 style="font-family:&quot;Space Grotesk&quot;,system-ui,sans-serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:0.05em;margin:0 0 8px">MyAPI</h1>';
      s+='<p style="color:#8b8fa3;font-size:14px;margin:0;animation:p 2s ease-in-out infinite">Memuatkan...</p>';l.innerHTML=s;d.body.appendChild(l);
      var t=d.createElement('style');t.textContent='@keyframes p{0%,100%{opacity:1}50%{opacity:0.5}}';d.head.appendChild(t);})();
    </script>
  </head>
  <body style="background:#0a0e27;margin:0">
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
